name: Fetch Gigs

on:
  schedule:
    - cron: '0 */12 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Fetch calendar events and BIT status
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          BANDSINTOWN_API_KEY: ${{ secrets.BANDSINTOWN_API_KEY }}
        run: node scripts/fetch-gigs.js

      - name: Commit and push if data changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/gigs.json data/bit-status.json
          git diff --staged --quiet || git commit -m "chore: update gigs [skip ci]"
          git push
