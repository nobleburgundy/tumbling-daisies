<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Tumbling Daisies</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sancreek&family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      display: flex;
      min-height: 100vh;
      background: #fff;
      color: hsl(0, 0%, 20%);
    }
    .admin-main {
      flex: 1;
      padding: 60px 40px;
      min-width: 0;
    }
    .admin-main, .admin-main *,
    .admin-sidebar, .admin-sidebar * {
      font-family: 'IBM Plex Mono', monospace;
    }
    .admin-title {
      font-size: 32px;
      font-weight: 600;
      color: hsl(0, 0%, 15%);
      margin-bottom: 40px;
    }
    .admin-section h2 {
      font-size: 14px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: hsl(0, 0%, 55%);
      margin-bottom: 20px;
    }

    /* Sidebar */
    .admin-sidebar {
      width: 380px;
      flex-shrink: 0;
      background: hsl(0, 0%, 97%);
      border-left: 1px solid hsl(0, 0%, 88%);
      padding: 60px 24px;
      overflow-y: auto;
    }
    .sidebar-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: hsl(0, 0%, 45%);
      margin-bottom: 24px;
    }
    .gig-card {
      background: #fff;
      border: 1px solid hsl(0, 0%, 85%);
      border-radius: 6px;
      margin-bottom: 12px;
    }
    .gig-header {
      padding: 12px 16px;
      cursor: pointer;
      display: flex;
      align-items: baseline;
      gap: 10px;
    }
    .gig-header:hover {
      background: hsl(0, 0%, 98%);
    }
    .gig-toggle {
      font-size: 10px;
      color: hsl(0, 0%, 55%);
      flex-shrink: 0;
      transition: transform 0.15s;
    }
    .gig-card.open .gig-toggle {
      transform: rotate(90deg);
    }
    .gig-header-info {
      flex: 1;
      min-width: 0;
    }
    .gig-details {
      display: none;
      padding: 0 16px 14px;
    }
    .gig-card.open .gig-details {
      display: block;
    }
    .gig-date {
      font-size: 11px;
      font-weight: 500;
      color: hsl(50, 70%, 40%);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }
    .gig-title {
      font-size: 15px;
      font-weight: 600;
      color: hsl(0, 0%, 15%);
      margin-bottom: 4px;
    }
    .gig-venue {
      font-size: 13px;
      color: hsl(0, 0%, 45%);
      margin-bottom: 4px;
    }
    .gig-location {
      font-size: 12px;
      color: hsl(0, 0%, 55%);
      margin-bottom: 8px;
    }
    .gig-status {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 2px 8px;
      border-radius: 3px;
      margin-bottom: 8px;
    }
    .gig-status.confirmed {
      background: hsla(120, 40%, 45%, 0.12);
      color: hsl(120, 40%, 35%);
    }
    .gig-status.hold {
      background: hsla(40, 60%, 50%, 0.15);
      color: hsl(40, 55%, 38%);
    }
    .gig-description {
      font-size: 12px;
      font-weight: 300;
      color: hsl(0, 0%, 45%);
      line-height: 1.5;
      margin-top: 8px;
      white-space: pre-wrap;
      border-top: 1px solid hsl(0, 0%, 90%);
      padding-top: 8px;
    }
    .gig-time {
      font-size: 12px;
      color: hsl(0, 0%, 45%);
      margin-bottom: 4px;
    }
    .gigs-empty {
      font-size: 13px;
      color: hsl(0, 0%, 55%);
    }
    .gig-visibility-btn {
      background: none;
      border: 1px solid hsl(0, 0%, 82%);
      border-radius: 4px;
      padding: 3px 6px;
      cursor: pointer;
      font-size: 11px;
      font-family: 'IBM Plex Mono', monospace;
      color: hsl(0, 0%, 45%);
      display: inline-flex;
      align-items: center;
      gap: 4px;
      margin-left: 8px;
    }
    .gig-visibility-btn:hover {
      background: hsl(0, 0%, 94%);
    }
    .gig-visibility-btn.is-hidden {
      color: hsl(0, 70%, 50%);
      border-color: hsl(0, 50%, 80%);
    }
    .gig-card.is-hidden .gig-header {
      opacity: 0.45;
    }
    .hidden-gigs-export {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid hsl(0, 0%, 88%);
      display: none;
    }
    .hidden-gigs-export.has-changes {
      display: block;
    }
    .hidden-gigs-export p {
      font-size: 11px;
      color: hsl(0, 0%, 50%);
      margin-bottom: 8px;
    }
    .hidden-gigs-export pre {
      font-size: 11px;
      background: hsl(0, 0%, 94%);
      border: 1px solid hsl(0, 0%, 85%);
      border-radius: 4px;
      padding: 8px 10px;
      white-space: pre-wrap;
      word-break: break-all;
      margin-bottom: 8px;
    }
    .hidden-gigs-export button {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      background: hsl(0, 0%, 20%);
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 5px 12px;
      cursor: pointer;
    }
    .hidden-gigs-export button:hover {
      background: hsl(0, 0%, 30%);
    }
    .subscriber-count {
      font-size: 13px;
      color: hsl(0, 0%, 45%);
      margin-bottom: 12px;
    }
    .subscriber-item {
      font-size: 13px;
      color: hsl(0, 0%, 25%);
      padding: 8px 0;
      border-bottom: 1px solid hsl(0, 0%, 92%);
      display: flex;
      justify-content: space-between;
    }
    .subscriber-item .sub-date {
      font-size: 11px;
      color: hsl(0, 0%, 55%);
    }

    /* Analytics */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: hsl(0, 0%, 97%);
      border: 1px solid hsl(0, 0%, 88%);
      border-radius: 6px;
      padding: 14px 16px;
    }
    .stat-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: hsl(0, 0%, 55%);
      margin-bottom: 6px;
    }
    .stat-value {
      font-size: 24px;
      font-weight: 600;
      color: hsl(0, 0%, 15%);
    }
    .top-pages-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }
    .top-pages-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid hsl(0, 0%, 92%);
      font-size: 13px;
    }
    .top-pages-list .page-path {
      color: hsl(0, 0%, 25%);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      flex: 1;
      min-width: 0;
    }
    .top-pages-list .page-count {
      color: hsl(0, 0%, 45%);
      font-size: 12px;
      margin-left: 12px;
      flex-shrink: 0;
    }
    .stats-bar {
      height: 4px;
      background: hsl(0, 0%, 90%);
      border-radius: 2px;
      margin-top: 4px;
    }
    .stats-bar-fill {
      height: 100%;
      background: hsl(50, 70%, 40%);
      border-radius: 2px;
    }
    .stats-error {
      font-size: 12px;
      color: hsl(0, 50%, 50%);
    }
    .stats-dashboard-link {
      display: inline-block;
      font-size: 12px;
      color: hsl(0, 0%, 45%);
      margin-bottom: 20px;
    }
    .stats-token-form {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 20px;
    }
    .stats-token-form input {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      border: 1px solid hsl(0, 0%, 82%);
      border-radius: 4px;
      padding: 5px 10px;
      flex: 1;
      min-width: 0;
      color: hsl(0, 0%, 25%);
    }
    .stats-token-form input::placeholder {
      color: hsl(0, 0%, 65%);
    }
    .stats-token-form button,
    .stats-token-clear {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      border: 1px solid hsl(0, 0%, 82%);
      border-radius: 4px;
      padding: 5px 12px;
      cursor: pointer;
      background: #fff;
      color: hsl(0, 0%, 35%);
      white-space: nowrap;
    }
    .stats-token-form button:hover,
    .stats-token-clear:hover {
      background: hsl(0, 0%, 94%);
    }
    .stats-token-status {
      font-size: 11px;
      color: hsl(120, 40%, 35%);
      margin-bottom: 16px;
    }
    .stats-timespan {
      display: flex;
      gap: 4px;
      margin-bottom: 20px;
    }
    .stats-timespan button {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      border: 1px solid hsl(0, 0%, 82%);
      border-radius: 4px;
      padding: 4px 10px;
      cursor: pointer;
      background: #fff;
      color: hsl(0, 0%, 45%);
    }
    .stats-timespan button:hover {
      background: hsl(0, 0%, 94%);
    }
    .stats-timespan button.active {
      background: hsl(0, 0%, 20%);
      color: #fff;
      border-color: hsl(0, 0%, 20%);
    }

    @media (max-width: 768px) {
      body {
        flex-direction: column;
      }
      .admin-sidebar {
        width: 100%;
        border-left: none;
        border-top: 1px solid hsl(0, 0%, 88%);
      }
    }
  </style>
</head>
<body>

  <div class="admin-main">
    <a href="index.html" style="color: hsl(0, 0%, 45%); font-size: 13px; text-decoration: none;">&larr; Back to site</a>
    <h1 class="admin-title">Admin</h1>

    <div class="admin-section">
      <h2>Mailing List</h2>
      <div id="subscribers-list">
        <span class="gigs-empty">Loading subscribers...</span>
      </div>
    </div>

    <div class="admin-section" style="margin-top: 40px;">
      <h2>Site Analytics</h2>
      <div id="analytics-container">
        <span class="gigs-empty">Loading analytics...</span>
      </div>
    </div>
  </div>

  <aside class="admin-sidebar">
    <div class="sidebar-title">Upcoming Gigs</div>
    <div id="gigs-list">
      <span class="gigs-empty">Loading...</span>
    </div>
    <div class="hidden-gigs-export" id="hidden-gigs-export">
      <p>Hidden gigs changed. Update <code>hidden-gigs.json</code> with:</p>
      <pre id="hidden-gigs-json"></pre>
      <button id="copy-hidden-gigs">Copy to clipboard</button>
    </div>
  </aside>

  <script>
    (function () {
      var MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

      function fmtDate(dateStr) {
        var d = new Date(dateStr);
        return MONTHS[d.getUTCMonth()] + ' ' + d.getUTCDate() + ', ' + d.getUTCFullYear();
      }

      function fmtTime(isoString) {
        var d = new Date(isoString);
        var h = d.getHours();
        var m = d.getMinutes();
        var ampm = h >= 12 ? 'PM' : 'AM';
        h = h % 12 || 12;
        return h + (m ? ':' + (m < 10 ? '0' : '') + m : '') + ' ' + ampm;
      }

      function stripHtml(str) {
        var tmp = document.createElement('div');
        tmp.innerHTML = str;
        return tmp.textContent || tmp.innerText || '';
      }

      // --- Fetch subscribers ---
      var SHEET_URL = 'https://script.google.com/macros/s/AKfycbxoeUEz50ZId9GLN3fDZ8Rz1vtyKNEE2F6SD6OjFawQG0HZRq9XCxNUYvmsASiFFu0M/exec';

      fetch(SHEET_URL)
        .then(function (res) { return res.json(); })
        .then(function (data) {
          var container = document.getElementById('subscribers-list');
          var subs = data.subscribers || [];

          if (subs.length === 0) {
            container.innerHTML = '<span class="gigs-empty">No subscribers yet.</span>';
            return;
          }

          var html = '<div class="subscriber-count">' + subs.length + ' subscriber' + (subs.length !== 1 ? 's' : '') + '</div>';
          subs.forEach(function (sub) {
            var date = sub.date ? new Date(sub.date).toLocaleDateString() : '';
            html += '<div class="subscriber-item"><span>' + sub.email + '</span><span class="sub-date">' + date + '</span></div>';
          });

          container.innerHTML = html;
        })
        .catch(function () {
          document.getElementById('subscribers-list').innerHTML = '<span class="gigs-empty">Could not load subscribers.</span>';
        });

      // --- Hidden gigs ---
      var hiddenGigIds = [];
      var savedHiddenGigIds = [];

      function loadSavedHiddenGigs() {
        return fetch('hidden-gigs.json')
          .then(function (res) { return res.json(); })
          .then(function (ids) {
            savedHiddenGigIds = ids || [];
            hiddenGigIds = savedHiddenGigIds.slice();
          })
          .catch(function () {
            savedHiddenGigIds = [];
            hiddenGigIds = [];
          });
      }

      function updateExportPanel() {
        var panel = document.getElementById('hidden-gigs-export');
        var pre = document.getElementById('hidden-gigs-json');
        var same = JSON.stringify(hiddenGigIds.sort()) === JSON.stringify(savedHiddenGigIds.sort());
        if (same) {
          panel.classList.remove('has-changes');
        } else {
          panel.classList.add('has-changes');
          pre.textContent = JSON.stringify(hiddenGigIds, null, 2);
        }
      }

      function toggleGigVisibility(gigId, card, btn) {
        var idx = hiddenGigIds.indexOf(gigId);
        if (idx === -1) {
          hiddenGigIds.push(gigId);
          card.classList.add('is-hidden');
          btn.classList.add('is-hidden');
          btn.textContent = 'hidden';
        } else {
          hiddenGigIds.splice(idx, 1);
          card.classList.remove('is-hidden');
          btn.classList.remove('is-hidden');
          btn.textContent = 'visible';
        }
        updateExportPanel();
      }

      document.getElementById('copy-hidden-gigs').addEventListener('click', function () {
        var text = JSON.stringify(hiddenGigIds, null, 2);
        navigator.clipboard.writeText(text).then(function () {
          var btn = document.getElementById('copy-hidden-gigs');
          btn.textContent = 'Copied!';
          setTimeout(function () { btn.textContent = 'Copy to clipboard'; }, 1500);
        });
      });

      // --- Fetch gigs ---
      loadSavedHiddenGigs().then(function () {
        return fetch('gigs.json');
      })
        .then(function (res) { return res.json(); })
        .then(function (data) {
          var container = document.getElementById('gigs-list');
          var now = new Date();
          var todayStr = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');
          var upcoming = (data.gigs || []).filter(function (g) {
            return g.date >= todayStr;
          });

          if (upcoming.length === 0) {
            container.innerHTML = '<span class="gigs-empty">No upcoming gigs.</span>';
            return;
          }

          container.innerHTML = '';
          upcoming.forEach(function (gig) {
            var isHidden = hiddenGigIds.indexOf(gig.id) !== -1;
            var card = document.createElement('div');
            card.className = 'gig-card' + (isHidden ? ' is-hidden' : '');

            // Collapsed header: date, status, title
            var header = '<div class="gig-header">';
            header += '<span class="gig-toggle">&#9654;</span>';
            header += '<div class="gig-header-info">';
            header += '<div class="gig-date">' + fmtDate(gig.date) + '</div>';
            header += '<span class="gig-status ' + gig.status + '">' + gig.status + '</span>';
            header += '<div class="gig-title">' + (gig.title || 'Untitled') + '</div>';
            header += '</div></div>';

            // Expandable details
            var details = '<div class="gig-details">';
            if (gig.venue && gig.venue !== gig.title) {
              details += '<div class="gig-venue">' + gig.venue + '</div>';
            }
            if (gig.location) {
              details += '<div class="gig-location">' + gig.location + '</div>';
            }
            if (gig.startTime) {
              var timeStr = fmtTime(gig.startTime);
              if (gig.endTime) timeStr += ' – ' + fmtTime(gig.endTime);
              details += '<div class="gig-time">' + timeStr + '</div>';
            }
            if (gig.description) {
              details += '<div class="gig-description">' + stripHtml(gig.description) + '</div>';
            }
            details += '<button class="gig-visibility-btn' + (isHidden ? ' is-hidden' : '') + '">' + (isHidden ? 'hidden' : 'visible') + '</button>';
            details += '</div>';

            card.innerHTML = header + details;
            card.querySelector('.gig-header').addEventListener('click', function () {
              card.classList.toggle('open');
            });
            var visBtn = card.querySelector('.gig-visibility-btn');
            visBtn.addEventListener('click', function (e) {
              e.stopPropagation();
              toggleGigVisibility(gig.id, card, visBtn);
            });
            container.appendChild(card);
          });
        })
        .catch(function () {
          document.getElementById('gigs-list').innerHTML = '<span class="gigs-empty">Could not load gigs.</span>';
        });
    })();
  </script>

  <script>
    (function () {
      var GC_SITE = 'tumblingdaisies';
      var BASE = 'https://' + GC_SITE + '.goatcounter.com';
      var container = document.getElementById('analytics-container');

      function fmtNum(n) {
        return n.toLocaleString();
      }

      function isoDate(d) {
        return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
      }

      var TIMESPANS = [
        { key: 'today', label: 'Today', days: 0 },
        { key: 'week', label: 'This Week', weekStart: true },
        { key: '7d', label: '7 Days', days: 7 },
        { key: '30d', label: '30 Days', days: 30 },
        { key: '1y', label: '1 Year', days: 365 }
      ];
      var activeTimespan = '7d';

      function getStartDate(span) {
        var now = new Date();
        if (span.days === 0) return isoDate(now);
        if (span.weekStart) {
          var d = new Date(now);
          var day = d.getDay();
          var diff = day === 0 ? 6 : day - 1;
          d.setDate(d.getDate() - diff);
          return isoDate(d);
        }
        var d = new Date(now);
        d.setDate(d.getDate() - span.days);
        return isoDate(d);
      }

      function renderChrome() {
        var token = localStorage.getItem('goatcounter_token');
        var html = '<a class="stats-dashboard-link" href="' + BASE + '" target="_blank">View full dashboard on GoatCounter &rarr;</a>';

        if (token) {
          html += '<div class="stats-token-status">API token saved <button class="stats-token-clear" id="clear-token">Clear token</button></div>';
          html += '<div class="stats-timespan" id="timespan-picker">';
          TIMESPANS.forEach(function (span) {
            html += '<button data-span="' + span.key + '"' + (span.key === activeTimespan ? ' class="active"' : '') + '>' + span.label + '</button>';
          });
          html += '</div>';
        } else {
          html += '<div class="stats-token-form" id="token-form">' +
            '<input type="password" id="token-input" placeholder="Paste GoatCounter API token">' +
            '<button id="save-token">Save</button>' +
            '</div>';
        }

        html += '<div id="stats-content"></div>';
        container.innerHTML = html;

        if (token) {
          document.getElementById('clear-token').addEventListener('click', function () {
            localStorage.removeItem('goatcounter_token');
            renderChrome();
          });
          document.getElementById('timespan-picker').addEventListener('click', function (e) {
            if (e.target.tagName !== 'BUTTON') return;
            activeTimespan = e.target.getAttribute('data-span');
            var btns = document.querySelectorAll('.stats-timespan button');
            btns.forEach(function (b) { b.classList.remove('active'); });
            e.target.classList.add('active');
            loadStats(token);
          });
          loadStats(token);
        } else {
          document.getElementById('save-token').addEventListener('click', saveToken);
          document.getElementById('token-input').addEventListener('keydown', function (e) {
            if (e.key === 'Enter') saveToken();
          });
        }
      }

      function saveToken() {
        var val = document.getElementById('token-input').value.trim();
        if (!val) return;
        localStorage.setItem('goatcounter_token', val);
        renderChrome();
      }

      function loadStats(token) {
        var statsEl = document.getElementById('stats-content');
        statsEl.innerHTML = '<span class="gigs-empty">Loading stats...</span>';
        var headers = { 'Authorization': 'Bearer ' + token };

        var span = TIMESPANS.find(function (s) { return s.key === activeTimespan; });
        var now = new Date();
        var start = getStartDate(span);
        var end = isoDate(now);

        var totalUrl = BASE + '/api/v0/stats/total?start=' + start + '&end=' + end;
        var pagesUrl = BASE + '/api/v0/stats/hits?start=' + start + '&end=' + end + '&limit=10';

        fetch(totalUrl, { headers: headers })
          .then(function (r) { return r.json(); })
          .then(function (totals) {
            return fetch(pagesUrl, { headers: headers })
              .then(function (r) { return r.json(); })
              .then(function (pages) { return { totals: totals, pages: pages }; });
          })
        .then(function (data) {
          var totals = data.totals;
          var pages = data.pages;

          if (totals.error) {
            statsEl.innerHTML = '<span class="stats-error">API error: ' + totals.error + '</span>';
            return;
          }

          var views = totals.total || 0;
          var visitors = totals.total_unique || 0;

          var html = '<div class="stats-grid" style="grid-template-columns: repeat(2, 1fr);">';
          html += '<div class="stat-card"><div class="stat-label">Views</div><div class="stat-value">' + fmtNum(views) + '</div></div>';
          html += '<div class="stat-card"><div class="stat-label">Visitors</div><div class="stat-value">' + fmtNum(visitors) + '</div></div>';
          html += '</div>';

          var hits = (pages.hits || []);
          if (hits.length > 0) {
            var maxCount = hits[0].count || 1;
            html += '<h3 style="font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.1em;color:hsl(0,0%,55%);margin-bottom:12px;">Top Pages</h3>';
            html += '<ul class="top-pages-list">';
            hits.forEach(function (page) {
              var pct = Math.round(((page.count || 0) / maxCount) * 100);
              html += '<li>';
              html += '<div style="flex:1;min-width:0;">';
              html += '<span class="page-path">' + (page.path || '/') + '</span>';
              html += '<div class="stats-bar"><div class="stats-bar-fill" style="width:' + pct + '%"></div></div>';
              html += '</div>';
              html += '<span class="page-count">' + fmtNum(page.count || 0) + '</span>';
              html += '</li>';
            });
            html += '</ul>';
          }

          statsEl.innerHTML = html;
        }).catch(function () {
          statsEl.innerHTML = '<span class="stats-error">Could not load analytics. Check your API token.</span>';
        });
      }

      renderChrome();
    })();
  </script>

</body>
</html>
