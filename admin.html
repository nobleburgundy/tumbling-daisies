<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Tumbling Daisies</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sancreek&family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      display: flex;
      min-height: 100vh;
      background: #fff;
      color: hsl(0, 0%, 20%);
    }
    .admin-main {
      flex: 1;
      padding: 60px 40px;
      min-width: 0;
    }
    .admin-main, .admin-main *,
    .admin-sidebar, .admin-sidebar * {
      font-family: 'IBM Plex Mono', monospace;
    }
    .admin-title {
      font-size: 32px;
      font-weight: 600;
      color: hsl(0, 0%, 15%);
      margin-bottom: 40px;
    }
    .admin-section h2 {
      font-size: 14px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: hsl(0, 0%, 55%);
      margin-bottom: 20px;
    }

    /* Sidebar */
    .admin-sidebar {
      width: 380px;
      flex-shrink: 0;
      background: hsl(0, 0%, 97%);
      border-left: 1px solid hsl(0, 0%, 88%);
      padding: 60px 24px;
      overflow-y: auto;
    }
    .sidebar-title {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: hsl(0, 0%, 45%);
      margin-bottom: 24px;
    }
    .gig-card {
      background: #fff;
      border: 1px solid hsl(0, 0%, 85%);
      border-radius: 6px;
      margin-bottom: 12px;
    }
    .gig-header {
      padding: 12px 16px;
      cursor: pointer;
      display: flex;
      align-items: baseline;
      gap: 10px;
    }
    .gig-header:hover {
      background: hsl(0, 0%, 98%);
    }
    .gig-toggle {
      font-size: 10px;
      color: hsl(0, 0%, 55%);
      flex-shrink: 0;
      transition: transform 0.15s;
    }
    .gig-card.open .gig-toggle {
      transform: rotate(90deg);
    }
    .gig-header-info {
      flex: 1;
      min-width: 0;
    }
    .gig-details {
      display: none;
      padding: 0 16px 14px;
    }
    .gig-card.open .gig-details {
      display: block;
    }
    .gig-date {
      font-size: 11px;
      font-weight: 500;
      color: hsl(50, 70%, 40%);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }
    .gig-title {
      font-size: 15px;
      font-weight: 600;
      color: hsl(0, 0%, 15%);
      margin-bottom: 4px;
    }
    .gig-venue {
      font-size: 13px;
      color: hsl(0, 0%, 45%);
      margin-bottom: 4px;
    }
    .gig-location {
      font-size: 12px;
      color: hsl(0, 0%, 55%);
      margin-bottom: 8px;
    }
    .gig-status {
      display: inline-block;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 2px 8px;
      border-radius: 3px;
      margin-bottom: 8px;
    }
    .gig-status.confirmed {
      background: hsla(120, 40%, 45%, 0.12);
      color: hsl(120, 40%, 35%);
    }
    .gig-status.hold {
      background: hsla(40, 60%, 50%, 0.15);
      color: hsl(40, 55%, 38%);
    }
    .gig-description {
      font-size: 12px;
      font-weight: 300;
      color: hsl(0, 0%, 45%);
      line-height: 1.5;
      margin-top: 8px;
      white-space: pre-wrap;
      border-top: 1px solid hsl(0, 0%, 90%);
      padding-top: 8px;
    }
    .gig-time {
      font-size: 12px;
      color: hsl(0, 0%, 45%);
      margin-bottom: 4px;
    }
    .gigs-empty {
      font-size: 13px;
      color: hsl(0, 0%, 55%);
    }
    .subscriber-count {
      font-size: 13px;
      color: hsl(0, 0%, 45%);
      margin-bottom: 12px;
    }
    .subscriber-item {
      font-size: 13px;
      color: hsl(0, 0%, 25%);
      padding: 8px 0;
      border-bottom: 1px solid hsl(0, 0%, 92%);
      display: flex;
      justify-content: space-between;
    }
    .subscriber-item .sub-date {
      font-size: 11px;
      color: hsl(0, 0%, 55%);
    }

    @media (max-width: 768px) {
      body {
        flex-direction: column;
      }
      .admin-sidebar {
        width: 100%;
        border-left: none;
        border-top: 1px solid hsl(0, 0%, 88%);
      }
    }
  </style>
</head>
<body>

  <div class="admin-main">
    <a href="index.html" style="color: hsl(0, 0%, 45%); font-size: 13px; text-decoration: none;">&larr; Back to site</a>
    <h1 class="admin-title">Admin</h1>

    <div class="admin-section">
      <h2>Mailing List</h2>
      <div id="subscribers-list">
        <span class="gigs-empty">Loading subscribers...</span>
      </div>
    </div>
  </div>

  <aside class="admin-sidebar">
    <div class="sidebar-title">Upcoming Gigs</div>
    <div id="gigs-list">
      <span class="gigs-empty">Loading...</span>
    </div>
  </aside>

  <script>
    (function () {
      var MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

      function fmtDate(dateStr) {
        var d = new Date(dateStr);
        return MONTHS[d.getUTCMonth()] + ' ' + d.getUTCDate() + ', ' + d.getUTCFullYear();
      }

      function fmtTime(isoString) {
        var d = new Date(isoString);
        var h = d.getHours();
        var m = d.getMinutes();
        var ampm = h >= 12 ? 'PM' : 'AM';
        h = h % 12 || 12;
        return h + (m ? ':' + (m < 10 ? '0' : '') + m : '') + ' ' + ampm;
      }

      function stripHtml(str) {
        var tmp = document.createElement('div');
        tmp.innerHTML = str;
        return tmp.textContent || tmp.innerText || '';
      }

      // --- Fetch subscribers ---
      var SHEET_URL = 'https://script.google.com/macros/s/AKfycbxoeUEz50ZId9GLN3fDZ8Rz1vtyKNEE2F6SD6OjFawQG0HZRq9XCxNUYvmsASiFFu0M/exec';

      fetch(SHEET_URL)
        .then(function (res) { return res.json(); })
        .then(function (data) {
          var container = document.getElementById('subscribers-list');
          var subs = data.subscribers || [];

          if (subs.length === 0) {
            container.innerHTML = '<span class="gigs-empty">No subscribers yet.</span>';
            return;
          }

          var html = '<div class="subscriber-count">' + subs.length + ' subscriber' + (subs.length !== 1 ? 's' : '') + '</div>';
          subs.forEach(function (sub) {
            var date = sub.date ? new Date(sub.date).toLocaleDateString() : '';
            html += '<div class="subscriber-item"><span>' + sub.email + '</span><span class="sub-date">' + date + '</span></div>';
          });

          container.innerHTML = html;
        })
        .catch(function () {
          document.getElementById('subscribers-list').innerHTML = '<span class="gigs-empty">Could not load subscribers.</span>';
        });

      // --- Fetch gigs ---
      fetch('gigs.json')
        .then(function (res) { return res.json(); })
        .then(function (data) {
          var container = document.getElementById('gigs-list');
          var now = new Date();
          var todayStr = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0') + '-' + String(now.getDate()).padStart(2, '0');
          var upcoming = (data.gigs || []).filter(function (g) {
            return g.date >= todayStr;
          });

          if (upcoming.length === 0) {
            container.innerHTML = '<span class="gigs-empty">No upcoming gigs.</span>';
            return;
          }

          container.innerHTML = '';
          upcoming.forEach(function (gig) {
            var card = document.createElement('div');
            card.className = 'gig-card';

            // Collapsed header: date, status, title
            var header = '<div class="gig-header">';
            header += '<span class="gig-toggle">&#9654;</span>';
            header += '<div class="gig-header-info">';
            header += '<div class="gig-date">' + fmtDate(gig.date) + '</div>';
            header += '<span class="gig-status ' + gig.status + '">' + gig.status + '</span>';
            header += '<div class="gig-title">' + (gig.title || 'Untitled') + '</div>';
            header += '</div></div>';

            // Expandable details
            var details = '<div class="gig-details">';
            if (gig.venue && gig.venue !== gig.title) {
              details += '<div class="gig-venue">' + gig.venue + '</div>';
            }
            if (gig.location) {
              details += '<div class="gig-location">' + gig.location + '</div>';
            }
            if (gig.startTime) {
              var timeStr = fmtTime(gig.startTime);
              if (gig.endTime) timeStr += ' – ' + fmtTime(gig.endTime);
              details += '<div class="gig-time">' + timeStr + '</div>';
            }
            if (gig.description) {
              details += '<div class="gig-description">' + stripHtml(gig.description) + '</div>';
            }
            details += '</div>';

            card.innerHTML = header + details;
            card.querySelector('.gig-header').addEventListener('click', function () {
              card.classList.toggle('open');
            });
            container.appendChild(card);
          });
        })
        .catch(function () {
          document.getElementById('gigs-list').innerHTML = '<span class="gigs-empty">Could not load gigs.</span>';
        });
    })();
  </script>

</body>
</html>
